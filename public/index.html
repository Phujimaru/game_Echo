<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Echo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- =========================================================
       หน้าที่ 1: หน้าแรก
       ========================================================= -->
  <div id="home-screen" class="screen">
    <div class="menu-cards">
      <span>🂡</span><span>🂮</span><span>🂽</span><span>🃏</span>
    </div>
    <h1 class="menu-title">Echo</h1>
    <button class="big-button" onclick="goToSetup()">คลิ๊กเพื่อเริ่ม</button>
  </div>


  <!-- =========================================================
       หน้าที่ 2: ตั้งชื่อ + เลือกตัวละคร
       ========================================================= -->
  <div id="setup-screen" class="screen" style="display:none">
    <h2>ตั้งชื่อของคุณ</h2>
    <input id="name-input" type="text" maxlength="12" placeholder="พิมพ์ชื่อ..." />

    <h2>เลือกตัวละคร</h2>
    <div id="avatar-grid" class="avatar-grid"><!-- สร้างด้วย JavaScript --></div>

    <button class="big-button" onclick="joinLobby()">เข้าห้องรอ →</button>
  </div>


  <!-- =========================================================
       หน้าที่ 3: ห้องรอ
       ========================================================= -->
  <div id="lobby-screen" class="screen" style="display:none">
    <h1>🕹️ ห้องรอ</h1>
    <p id="lobby-info">กำลังรอผู้เล่น...</p>

    <div id="lobby-players" class="player-grid"><!-- รายชื่อผู้เล่น --></div>

    <div class="lobby-buttons">
      <button id="btn-solo" onclick="startGame()">เล่นคนเดียว</button>
      <button id="btn-start" onclick="startGame()" disabled>เริ่มเกม (รอเพื่อน)</button>
    </div>
  </div>


  <!-- =========================================================
       หน้าที่ 4: หน้าจอเล่นเกม
       ========================================================= -->
  <div id="game-screen" class="screen" style="display:none">
    <div id="timer-bar">⏱️ <span id="timer-text">30</span> วินาที</div>

    <div id="game-players" class="player-grid"><!-- ไพ่ของทุกคน --></div>

    <div id="game-message"></div>
    <div id="game-log"><!-- สรุปเหตุการณ์รอบ --></div>

    <!-- ปุ่มระหว่างเล่น -->
    <div id="play-controls">
      <button id="btn-hit" onclick="doHit()">จั่วไพ่ (Hit)</button>
      <button id="btn-lock" onclick="doLock()">เปิดไพ่ (พอแล้ว)</button>
      <button id="btn-skill" onclick="doSkill()" style="display:none">⚡ ท่าไม้ตาย</button>
    </div>

    <!-- ปุ่มตอนจบรอบ / จบเกม -->
    <div id="result-controls" style="display:none">
      <button id="btn-next" class="big-button" onclick="nextRound()">▶ ไปต่อเลย</button>
      <button id="btn-lobby" class="big-button" onclick="backToLobby()" style="display:none">🏠 กลับห้องรอ</button>
    </div>
  </div>


  <!-- Socket.io (เซิร์ฟเวอร์ส่งให้อัตโนมัติ) -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
